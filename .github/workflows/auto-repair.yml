name: Auto Repair Workflows

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_run:
    workflows: ["Build and Sign iOS IPA"]
    types: [completed]

jobs:
  repair:
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event_name == 'schedule' }}
    runs-on: macos-latest

    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: brew install yq

      - name: Repair workflows
        run: bash scripts/repair_workflows.sh

      - name: Regenerate signer workflow
        run: bash scripts/regenerate_signer_workflow.sh

      - name: Self-heal Xcode issues
        run: bash scripts/self_heal_xcode.sh

      - name: Commit Xcode source files
        run: bash scripts/commit_xcode_sources.sh
