name: Auto Repair Workflows

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_run:
    workflows: ["Build and Sign iOS IPA"]
    types:
      - completed

jobs:
  repair:
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event_name == 'schedule' }}
    runs-on: macos-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: brew install yq

      - name: Run repair script
        run: bash scripts/repair_workflows.sh
